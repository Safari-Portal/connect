components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authorization code flow with PKCE.
      flows:
        authorizationCode:
          authorizationUrl: https://account.safariportal.app/oauth/authorize
          tokenUrl: https://connect.safariportal.dev/oauth/token
          scopes:
            files:read: Read files and their events, categories, and stages
            files:write: Create and update files
            contacts:read: Read contacts
            contacts:write: Create and update contacts
            tasks:read: Read tasks
            users:read: Read account users
            invoices:read: Read invoices
            expenses:read: Read expenses
            forms:read: Read forms and their submissions
  parameters:
    AccId:
      name: acc_id
      in: path
      required: true
      description: Account id the token is bound to.
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      description: 1-based page number.
      schema:
        type: integer
        minimum: 1
    Limit:
      name: limit
      in: query
      required: false
      description: Page size.
      schema:
        type: integer
        minimum: 1
    Q:
      name: q
