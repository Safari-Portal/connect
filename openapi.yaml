          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/SubmissionList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /acc/{acc_id}/contacts/{contact_id}/form_submissions:
    get:
      operationId: listContactFormSubmissions
      summary: List a contact's form submissions
      security:
        - oauth2: [forms:read]
      parameters:
        - $ref: "#/components/parameters/AccId"
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/SubmissionList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /acc/{acc_id}/form_submissions/{id}:
    get:
      operationId: getFormSubmission
      summary: Retrieve a single form submission
      security:
        - oauth2: [forms:read]
      parameters:
        - $ref: "#/components/parameters/AccId"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The submission
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    $ref: "#/components/schemas/Submission"
                required:
                  - data
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /acc/{acc_id}/files:
    get:
      operationId: listFiles
      summary: List the account's files
