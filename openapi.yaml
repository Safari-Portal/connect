        - created_at
        - updated_at
    Submission:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        form_id:
          type: string
        contact_id:
          type: string
        file_id:
          type: string
          nullable: true
        submitted_at:
          type: string
        updated_at:
          type: string
        responses:
          type: array
          items:
            $ref: "#/components/schemas/SubmissionResponse"
      required:
        - id
        - form_id
        - contact_id
        - file_id
        - submitted_at
        - updated_at
        - responses
    SubmissionResponse:
      type: object
      additionalProperties: false
      properties:
        element_id:
          type: string
        label:
          type: string
          nullable: true
        type:
          type: string
        mapped_to:
          type: string
          nullable: true
        value:
          # A response value is a scalar, an array of strings, a file object, or
          # null (unanswered / file-typed with no upload). Null is carried by the
          # nullable string branch — valid OpenAPI 3.0 (unlike a top-level
          # `nullable` sibling of `oneOf`) and matched uniquely by openapi_parser.
          oneOf:
            - type: string
              nullable: true
            - type: number
            - type: boolean
            - type: array
              items:
                type: string
            - $ref: "#/components/schemas/SubmissionFileValue"
      required:
        - element_id
        - label
        - type
        - mapped_to
        - value
    SubmissionFileValue:
      type: object
      additionalProperties: false
      properties:
        filename:
          type: string
        url:
          type: string
      required:
        - filename
        - url
