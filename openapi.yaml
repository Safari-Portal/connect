openapi: 3.0.3
info:
  title: Safari Portal Connect API
  version: 1.0.0
  description: >
    Machine-readable contract for the Safari Portal Connect API. See the narrative
    documentation in README.md for the auth flow, conventions, and per-resource prose.
    All resource ids are opaque strings.
servers:
  - url: https://connect.safariportal.dev
    description: Production
paths:
  /accounts:
    get:
      operationId: listAccounts
      summary: List the agent accounts the token can act on
      security:
        - oauth2: []
      responses:
        "200":
          description: The accessible accounts
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
                required:
                  - data
        "401":
          $ref: "#/components/responses/Unauthorized"
  /acc/{acc_id}/contacts:
    get:
      operationId: listContacts
      summary: List the account's contacts (all types)
      security:
        - oauth2: [contacts:read]
      parameters:
        - $ref: "#/components/parameters/AccId"
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Scope"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ContactList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createContact
      summary: Create a contact
      security:
        - oauth2: [contacts:write]
      parameters:
        - $ref: "#/components/parameters/AccId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactWrite"
      responses:
        "201":
          $ref: "#/components/responses/ContactShow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /acc/{acc_id}/contacts/search:
    get:
      operationId: searchContacts
      summary: Search the account's contacts by type
      security:
        - oauth2: [contacts:read]
      parameters:
        - $ref: "#/components/parameters/AccId"
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Scope"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ContactList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /acc/{acc_id}/contacts/{id}:
    get:
      operationId: getContact
      summary: Retrieve a single contact
      security:
        - oauth2: [contacts:read]
      parameters:
        - $ref: "#/components/parameters/AccId"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/ContactShow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateContact
      summary: Update a contact
      security:
        - oauth2: [contacts:write]
      parameters:
        - $ref: "#/components/parameters/AccId"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactWrite"
      responses:
        "200":
          $ref: "#/components/responses/ContactShow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /acc/{acc_id}/forms:
    get:
      operationId: listForms
      summary: List the account's forms (metadata only)
      security:
        - oauth2: [forms:read]
      parameters:
        - $ref: "#/components/parameters/AccId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of forms
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Form"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - meta
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /acc/{acc_id}/forms/{id}:
    get:
      operationId: getForm
      summary: Retrieve a single form (metadata only)
      security:
        - oauth2: [forms:read]
      parameters:
        - $ref: "#/components/parameters/AccId"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The form
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    $ref: "#/components/schemas/Form"
                required:
                  - data
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /acc/{acc_id}/forms/{form_id}/submissions:
    get:
      operationId: listFormSubmissions
      summary: List a form's submissions
      security:
        - oauth2: [forms:read]
      parameters:
        - $ref: "#/components/parameters/AccId"
